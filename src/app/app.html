<app-header />

<main>
  <ul id="users">
    @for (user of users; track user.id) {
      <li>
        <app-user
          [user]="user"
          (select)="onSelectUser($event)"
          [selected]="user.id === selectedUserId"
        />
      </li>
    }
  </ul>

  @if (selectedUser) {
    <app-tasks [selectedUser]="selectedUser" />
  } @else {
    <p id="fallback">No user selected.</p>
  }
</main>
