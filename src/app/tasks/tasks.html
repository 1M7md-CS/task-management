@if (isAddingTask) {
  <app-new-task (close)="onCloseAddingTask()" [userId]="selectedUser.id" />
}

<section id="tasks">
  <header>
    <h2>{{ selectedUser.name }}' Tasks</h2>

    <menu>
      <button (click)="onStartAddTask()">Add Task</button>
    </menu>
  </header>

  <ul>
    @for (task of selectedUserTasks; track task.id) {
      <li>
        <app-task [task]="task" />
      </li>
    } @empty {
      <li class="empty">No tasks found for this user</li>
    }
  </ul>
</section>
